<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Coffee Administration</title>
  <meta name="description" content="Plataforma contable y de cotización para distribución de café specialty." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js" defer></script>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg" aria-hidden="true"></div>
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark" id="login-logo">BC</div>
        <h1>Black Coffee</h1>
        <p class="login-tagline">Administration</p>
      </div>
      <form id="login-form" autocomplete="on">
        <label class="field">
          <span>Usuario</span>
          <select id="login-user" required>
            <option value="">Seleccionar usuario</option>
            <option value="ximena">Ximena Polo</option>
            <option value="pablo">Pablo Colorado Gómez</option>
          </select>
        </label>
        <label class="field">
          <span>Contraseña</span>
          <input type="password" id="login-pass" required placeholder="••••••••" />
        </label>
        <p id="login-error" class="form-error" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Entrar a la plataforma</button>
      </form>
      <p class="login-hint">Notificaciones → ghostspecialtycoffee@gmail.com</p>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark brand-mark-sm" id="app-logo">BC</div>
        <div>
          <strong>Black Coffee</strong>
          <small>Administration</small>
        </div>
      </div>
      <nav class="sidebar-nav" id="main-nav">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="cotizaciones">Cotizaciones</button>
        <button class="nav-item" data-view="ventas">Registro de ventas</button>
        <button class="nav-item" data-view="compras">Registro de compras</button>
        <button class="nav-item" data-view="inventario">Inventario</button>
        <button class="nav-item" data-view="cafes">Cafés / Variedades</button>
        <button class="nav-item" data-view="clientes">Clientes</button>
        <button class="nav-item" data-view="proveedores">Proveedores</button>
        <button class="nav-item" data-view="costos">Costos de producción</button>
        <button class="nav-item" data-view="notificaciones">Notificaciones</button>
        <button class="nav-item" data-view="configuracion">Apariencia</button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <span class="user-avatar" id="user-avatar">XP</span>
          <div>
            <strong id="user-name">Usuario</strong>
            <small id="user-role">Admin</small>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Cerrar sesión</button>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <button class="btn btn-ghost btn-icon" id="menu-toggle" aria-label="Menú">☰</button>
        <div class="topbar-title">
          <h2 id="view-title">Dashboard</h2>
          <p id="view-subtitle">Resumen operativo</p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost btn-icon notif-bell" id="notif-bell" aria-label="Notificaciones">
            <span>🔔</span>
            <i id="notif-badge" class="badge" hidden>0</i>
          </button>
          <button class="btn btn-secondary" data-quick="nueva-cotizacion">+ Cotización</button>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-root" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal" role="dialog" aria-modal="true">
      <header class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn btn-ghost btn-icon" data-close-modal aria-label="Cerrar">✕</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
      <footer class="modal-footer" id="modal-footer"></footer>
    </div>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
