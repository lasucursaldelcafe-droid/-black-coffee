<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Black Coffee Administration — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div style="font-size:3rem;margin-bottom:12px">☕</div>
          <h1 class="display-title">Black Coffee</h1>
          <p>Administration Platform</p>
        </div>

        <div class="login-error" id="login-error"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" class="form-control" id="username" placeholder="ximena.polo o pablo.colorado" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
            Iniciar Sesión
          </button>
        </form>

        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-color);text-align:center">
          <p style="font-size:0.8rem;color:var(--text-muted)">
            Plataforma de gestión integral de café de especialidad
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    Auth.init();

    if (Auth.isAuthenticated()) {
      window.location.href = 'app.html';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      const result = Auth.login(username, password);

      if (result.success) {
        window.location.href = 'app.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
