name: Desbloquear Firebase

# Publica reglas Firestore (+ Functions opcional) para habilitar sync directa.
# Ejecutar: Actions → Desbloquear Firebase → Run workflow
# Pegar firebase_token (salida de: npx firebase login:ci)

on:
  workflow_dispatch:
    inputs:
      firebase_token:
        description: 'Token Firebase (npx firebase login:ci) — obligatorio si no existe secret FIREBASE_TOKEN'
        required: false
        type: string
      deploy_functions:
        description: 'Desplegar Cloud Functions (correo Resend — requiere plan Blaze)'
        required: false
        type: boolean
        default: true
      save_token_as_secret:
        description: 'Guardar token en GitHub Secrets para futuros deploys automáticos'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  desbloquear:
    name: Publicar reglas Firestore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolver token Firebase
        id: token
        env:
          SECRET_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          INPUT_TOKEN: ${{ github.event.inputs.firebase_token }}
        run: |
          TOKEN="${INPUT_TOKEN:-$SECRET_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Sin token Firebase. Ejecute en su PC: npx firebase login:ci"
            echo "::error::Luego pegue el token en el campo firebase_token de este workflow."
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "Token Firebase resuelto (${#TOKEN} caracteres)"

      - name: Guardar token en GitHub Secrets
        if: github.event.inputs.save_token_as_secret != 'false' && github.event.inputs.firebase_token != ''
        env:
          GH_TOKEN: ${{ github.token }}
          FB_TOKEN: ${{ github.event.inputs.firebase_token }}
        run: |
          echo "$FB_TOKEN" | gh secret set FIREBASE_TOKEN --repo "${{ github.repository }}"
          echo "FIREBASE_TOKEN guardado en GitHub Secrets"

      - name: Instalar dependencias Functions
        if: github.event.inputs.deploy_functions != 'false'
        working-directory: functions
        run: npm ci || npm install

      - name: Configurar secretos Resend en Firebase
        if: github.event.inputs.deploy_functions != 'false'
        env:
          FIREBASE_TOKEN: ${{ steps.token.outputs.token }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_BOOTSTRAP: re_cwQwSzDh_D87Cmoe1jraQuAjyTkkXSQkH
        run: |
          RESEND="${RESEND_API_KEY:-$RESEND_BOOTSTRAP}"
          npm install -g firebase-tools
          printf '%s' "$RESEND" | firebase functions:secrets:set RESEND_API_KEY --project black-coffee-15ccc --data-file - --token "$FIREBASE_TOKEN"
          printf '%s' 'Black Coffee <onboarding@resend.dev>' | firebase functions:secrets:set BCA_FROM_EMAIL --project black-coffee-15ccc --data-file - --token "$FIREBASE_TOKEN"

      - name: Desplegar reglas Firestore
        env:
          FIREBASE_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          npx firebase-tools deploy --only firestore:rules --project black-coffee-15ccc --token "$FIREBASE_TOKEN"

      - name: Desplegar Cloud Functions
        if: github.event.inputs.deploy_functions != 'false'
        env:
          FIREBASE_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          npx firebase-tools deploy --only functions --project black-coffee-15ccc --token "$FIREBASE_TOKEN"

      - name: Verificar acceso Firestore
        run: |
          npm install firebase@11 --no-save
          node scripts/test-firestore-access.mjs

      - name: Resumen
        run: |
          echo "Firebase desbloqueado."
          echo "App: https://lasucursaldelcafe-droid.github.io/-black-coffee/"
          echo "Consola: https://console.firebase.google.com/project/black-coffee-15ccc/firestore/rules"
