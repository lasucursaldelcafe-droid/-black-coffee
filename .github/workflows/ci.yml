name: CI Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'cursor/**']
  workflow_dispatch:

jobs:
  verify-and-test:
    name: Versión + persistencia
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar DATA_VERSION = BCA_BUILD
        run: node scripts/verify-build-version.mjs

      - name: Instalar Playwright
        run: npm install playwright@1.49.1 --no-save

      - name: Instalar Chromium
        run: npx playwright install chromium

      - name: Test de persistencia
        run: node scripts/test-persistence.mjs
