name: Desplegar Firebase (correo + reglas)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firebase.json'
      - '.github/workflows/desplegar-firebase.yml'

jobs:
  desplegar:
    name: Desplegar Functions y Firestore
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de Functions
        working-directory: functions
        run: npm ci || npm install

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Configurar secreto RESEND en Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          printf '%s' "$RESEND_API_KEY" | firebase functions:secrets:set RESEND_API_KEY --project black-coffee-15ccc --data-file -
          printf '%s' 'Black Coffee <onboarding@resend.dev>' | firebase functions:secrets:set BCA_FROM_EMAIL --project black-coffee-15ccc --data-file -

      - name: Desplegar Functions y reglas Firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions,firestore:rules --project black-coffee-15ccc

      - name: Resumen
        run: echo "Despliegue completado. Prueba registrando una venta en la app."
