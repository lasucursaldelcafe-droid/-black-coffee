name: Publicar reglas Firestore

on:
  workflow_dispatch:
    inputs:
      firebase_token:
        description: 'Token Firebase (opcional si ya existe secret FIREBASE_TOKEN)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .github/workflows/publicar-reglas-firestore.yml

jobs:
  reglas:
    name: Desplegar firestore.rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publicar reglas
        env:
          SECRET_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          INPUT_TOKEN: ${{ github.event.inputs.firebase_token }}
        run: |
          TOKEN="${INPUT_TOKEN:-$SECRET_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Falta FIREBASE_TOKEN. Actions → Desbloquear Firebase → pegue token de: npx firebase login:ci"
            exit 1
          fi
          npx firebase-tools deploy --only firestore:rules --project black-coffee-15ccc --token "$TOKEN"
          npm install firebase@11 --no-save
          node scripts/test-firestore-access.mjs

      - name: Listo
        run: echo "Reglas publicadas. Ximena puede usar Configuración → Publicar mis datos a la nube."
