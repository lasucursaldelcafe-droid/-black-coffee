name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Firebase config from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          GENERATED=$(node scripts/generate-firebase-config.js)
          if echo "$GENERATED" | grep -q '"projectId"'; then
            echo "$GENERATED" > js/firebase-config.js
            echo "Firebase config generada desde GitHub Secrets"
          else
            echo "Secrets no configurados; se mantiene js/firebase-config.js del repositorio"
          fi

      - name: Install Playwright and run tests
        run: |
          npm install playwright@1.49.1 --no-save
          npx playwright install chromium
          node scripts/test-persistence.mjs

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean: true
          single-commit: true
          ignoreFiles: |
            node_modules/**
            scripts/**
            .git/**
            .github/**
