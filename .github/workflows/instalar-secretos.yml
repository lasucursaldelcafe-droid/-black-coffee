name: Instalar secretos de GitHub

# Ejecutar UNA VEZ desde GitHub → Actions → "Instalar secretos de GitHub" → Run workflow
# Pegar solo RESEND_API_KEY y FIREBASE_TOKEN en el formulario.

on:
  workflow_dispatch:
    inputs:
      resend_api_key:
        description: 'Clave Resend (re_...) — SECRETO'
        required: true
        type: string
      firebase_token:
        description: 'Token Firebase (firebase login:ci) — SECRETO'
        required: true
        type: string

jobs:
  instalar:
    name: Guardar secretos en el repositorio
    runs-on: ubuntu-latest
    steps:
      - name: Guardar RESEND_API_KEY
        env:
          RESEND_API_KEY: ${{ github.event.inputs.resend_api_key }}
        run: echo "Secreto recibido (no se muestra en logs)"

      - name: Configurar secretos con GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
          RESEND: ${{ github.event.inputs.resend_api_key }}
          FB_TOKEN: ${{ github.event.inputs.firebase_token }}
        run: |
          echo "$RESEND" | gh secret set RESEND_API_KEY --repo "${{ github.repository }}"
          echo "$FB_TOKEN" | gh secret set FIREBASE_TOKEN --repo "${{ github.repository }}"
          echo 'Black Coffee <onboarding@resend.dev>' | gh secret set BCA_FROM_EMAIL --repo "${{ github.repository }}"
          echo "AIzaSyCWh3Yf-ZkvZ-ey8Rm_sXSDUA6EC02C9GU" | gh secret set FIREBASE_API_KEY --repo "${{ github.repository }}"
          echo "black-coffee-15ccc.firebaseapp.com" | gh secret set FIREBASE_AUTH_DOMAIN --repo "${{ github.repository }}"
          echo "black-coffee-15ccc" | gh secret set FIREBASE_PROJECT_ID --repo "${{ github.repository }}"
          echo "black-coffee-15ccc.firebasestorage.app" | gh secret set FIREBASE_STORAGE_BUCKET --repo "${{ github.repository }}"
          echo "1091720202058" | gh secret set FIREBASE_MESSAGING_SENDER_ID --repo "${{ github.repository }}"
          echo "1:1091720202058:web:3dacbf4df3b787c34c23b3" | gh secret set FIREBASE_APP_ID --repo "${{ github.repository }}"

      - name: Listo
        run: |
          echo "Secretos instalados. Ahora ejecuta el workflow 'Desplegar Firebase (correo + reglas)'."
