name: Auto instalar secretos (sin intervención)

# Se ejecuta solo en push a main. Usa GITHUB_TOKEN con permiso secrets:write.
# No requiere workflow_dispatch manual.

on:
  push:
    branches: [main]

permissions:
  contents: read
  secrets: write

jobs:
  instalar-secretos:
    name: Configurar secretos del repositorio
    runs-on: ubuntu-latest
    steps:
      - name: Guardar secretos Firebase + Resend
        env:
          GH_TOKEN: ${{ github.token }}
          # Bootstrap: valores proporcionados por el equipo (rotar en Resend si se expusieron)
          RESEND: re_cwQwSzDh_D87Cmoe1jraQuAjyTkkXSQkH
          FB_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          echo "$RESEND" | gh secret set RESEND_API_KEY --repo "${{ github.repository }}"
          echo 'Black Coffee <onboarding@resend.dev>' | gh secret set BCA_FROM_EMAIL --repo "${{ github.repository }}"
          echo "AIzaSyCWh3Yf-ZkvZ-ey8Rm_sXSDUA6EC02C9GU" | gh secret set FIREBASE_API_KEY --repo "${{ github.repository }}"
          echo "black-coffee-15ccc.firebaseapp.com" | gh secret set FIREBASE_AUTH_DOMAIN --repo "${{ github.repository }}"
          echo "black-coffee-15ccc" | gh secret set FIREBASE_PROJECT_ID --repo "${{ github.repository }}"
          echo "black-coffee-15ccc.firebasestorage.app" | gh secret set FIREBASE_STORAGE_BUCKET --repo "${{ github.repository }}"
          echo "1091720202058" | gh secret set FIREBASE_MESSAGING_SENDER_ID --repo "${{ github.repository }}"
          echo "1:1091720202058:web:3dacbf4df3b787c34c23b3" | gh secret set FIREBASE_APP_ID --repo "${{ github.repository }}"
          if [ -n "$FB_TOKEN" ]; then
            echo "$FB_TOKEN" | gh secret set FIREBASE_TOKEN --repo "${{ github.repository }}"
            echo "FIREBASE_TOKEN actualizado"
          else
            echo "FIREBASE_TOKEN aún no configurado — el deploy Firebase esperará hasta firebase login:ci"
          fi
          echo "Secretos instalados correctamente"

  desplegar-firebase:
    name: Desplegar Firebase si hay token
    needs: instalar-secretos
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar FIREBASE_TOKEN
        id: check
        env:
          FB_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FB_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Sin FIREBASE_TOKEN — omitiendo deploy Firebase"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '20'

      - name: Instalar dependencias Functions
        if: steps.check.outputs.skip != 'true'
        working-directory: functions
        run: npm ci || npm install

      - name: Instalar Firebase CLI
        if: steps.check.outputs.skip != 'true'
        run: npm install -g firebase-tools

      - name: Configurar secretos Firebase Functions
        if: steps.check.outputs.skip != 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          printf '%s' "$RESEND_API_KEY" | firebase functions:secrets:set RESEND_API_KEY --project black-coffee-15ccc --data-file -
          printf '%s' 'Black Coffee <onboarding@resend.dev>' | firebase functions:secrets:set BCA_FROM_EMAIL --project black-coffee-15ccc --data-file -

      - name: Desplegar Functions y reglas
        if: steps.check.outputs.skip != 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions,firestore:rules --project black-coffee-15ccc
